<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowGuard AI 🌿</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [selectedFile, setSelectedFile] = useState(null);
            const [previewUrl, setPreviewUrl] = useState(null);
            const [prediction, setPrediction] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            const handleFile = (file) => {
                setError(null);
                setSelectedFile(file);
                setPreviewUrl(URL.createObjectURL(file));
                setPrediction(null);
            };

            const analyze = async () => {
                setLoading(true);
                const formData = new FormData();
                formData.append('file', selectedFile);
                try {
                    const res = await axios.post('http://localhost:8000/api/v1/predict', formData);
                    setPrediction(res.data);
                } catch (err) {
                    setError("Failed to connect to backend. Make sure 'python run.py' is running.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="max-w-4xl mx-auto space-y-12">
                    <header class="text-center">
                        <h1 class="text-5xl font-bold mb-2">GrowGuard AI 🌿</h1>
                        <p class="text-emerald-200 text-lg">Instant Plant Disease Analysis</p>
                    </header>

                    <main>
                        {!prediction ? (
                            <div class="glass p-12 rounded-3xl text-center space-y-8 shadow-2xl">
                                {previewUrl ? (
                                    <div class="space-y-6">
                                        <img src={previewUrl} class="mx-auto max-h-80 rounded-2xl shadow-lg border-4 border-emerald-500/30" />
                                        <div class="flex justify-center gap-4">
                                            <button onClick={() => setPreviewUrl(null)} class="px-6 py-3 bg-white/10 rounded-xl hover:bg-white/20 transition">Change</button>
                                            <button onClick={analyze} class="px-8 py-3 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition flex items-center gap-2">
                                                {loading && <div class="w-5 h-5 border-t-2 border-white rounded-full spin"></div>}
                                                {loading ? 'Analyzing...' : 'Analyze Leaf'}
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div onClick={() => fileInputRef.current.click()} class="border-2 border-dashed border-white/20 p-20 rounded-2xl cursor-pointer hover:bg-white/5 transition">
                                        <div class="text-emerald-400 text-6xl mb-4">＋</div>
                                        <h3 class="text-2xl font-semibold">Upload Potato Leaf</h3>
                                        <p class="text-slate-400">Click to browse or drag and drop</p>
                                    </div>
                                )}
                                <input type="file" ref={fileInputRef} hidden onChange={(e) => handleFile(e.target.files[0])} />
                            </div>
                        ) : (
                            <div class="grid md:grid-cols-2 gap-8">
                                <div class="glass p-8 rounded-3xl space-y-6">
                                    <div class="flex items-center gap-4">
                                        <div class={`p-3 rounded-full ${prediction.is_healthy ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                                            {prediction.is_healthy ? '✔' : '⚠'}
                                        </div>
                                        <div>
                                            <h2 class="text-3xl font-bold">{prediction.predicted_class.replace(/___/g, ' ')}</h2>
                                            <p class="text-emerald-400 font-semibold">{prediction.confidence}% Confidence</p>
                                        </div>
                                    </div>
                                    <div class="space-y-4">
                                        {prediction.all_predictions.map(p => (
                                            <div key={p.label}>
                                                <div class="flex justify-between text-sm mb-1 text-slate-300">
                                                    <span>{p.label.replace(/___/g, ' ')}</span>
                                                    <span>{p.confidence}%</span>
                                                </div>
                                                <div class="h-2 bg-white/10 rounded-full overflow-hidden">
                                                    <div class="h-full bg-emerald-500 transition-all duration-1000" style={{width: `${p.confidence}%`}}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setPrediction(null)} class="w-full py-4 border border-white/20 rounded-xl hover:bg-white/5 transition">Analyze Another</button>
                                </div>
                                <div class="glass p-8 rounded-3xl space-y-4">
                                    <h3 class="text-xl font-bold border-b border-white/10 pb-2">Treatment Advice</h3>
                                    <p class="text-lg text-slate-200 leading-relaxed font-light italic">"{prediction.message}"</p>
                                    <div class="bg-emerald-500/10 p-4 rounded-xl space-y-2 border border-emerald-500/20">
                                        <p class="text-sm font-semibold text-emerald-400">🌿 Pro Tip:</p>
                                        <p class="text-xs text-emerald-200 uppercase">Ensure proper spacing between plants to improve airflow and reduce humidity.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        {error && <div class="mt-8 p-4 bg-red-500/20 border border-red-500/50 rounded-xl text-center text-red-300">{error}</div>}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
